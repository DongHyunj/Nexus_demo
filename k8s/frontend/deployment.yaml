apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-frontend
  labels:
    app: nexus-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexus-frontend
  template:
    metadata:
      labels:
        app: nexus-frontend
    spec:
      containers:
        - name: nexus-frontend
          image: deatytim/nexusfront:latest
          ports:
            - containerPort: 80
