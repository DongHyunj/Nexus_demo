apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexus-frontend-ingress
  namespace: default
  annotations: {}
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nexus-frontend-svc
                port:
                  number: 80
